name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: python -m compileall -q src ops
      - name: Healthy deploy and forced rollback
        shell: bash
        run: |
          set -euo pipefail
          trap 'python ops/deploy.py stop' EXIT
          ARTIFACT_DIGEST=sha256:stable python ops/deploy.py deploy
          python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"
          ARTIFACT_DIGEST=sha256:candidate P6_DEMO_FORCE_UNHEALTHY=true python ops/deploy.py deploy
          if curl --fail --silent http://127.0.0.1:8000/health; then
            echo "expected unhealthy candidate to return a non-2xx response"
            exit 1
          fi
          ARTIFACT_DIGEST=sha256:stable python ops/deploy.py rollback
          python -c "import json, urllib.request; d=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health')); assert d['digest']=='sha256:stable'"
      - run: docker build -t agentic-sdlc-demo-app:${{ github.sha }} .
