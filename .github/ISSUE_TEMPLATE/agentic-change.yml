name: Agentic change
description: Request a change through the Agentic SDLC demo
title: "[Agentic] "
labels: ["agentic-sdlc"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What outcome should the application deliver?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Use observable, testable criteria.
      placeholder: |
        - Given ..., when ..., then ...
        - The health endpoint remains available
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk
      options:
        - low
        - medium
        - high
    validations:
      required: true
